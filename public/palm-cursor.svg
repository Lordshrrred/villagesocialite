  <!-- Trunk -->
  <path d="M13 16 Q11.2 29.5 13.5 42.5 L14 44 L14.5 42.5 Q16.8 29.5 15 16 Z" fill="#7a4b28"/>
  <!-- Top frond -->
  <path d="M14 14.5 C13 6 14 0 14 0 C14 0 15 6 14 14.5 Z" fill="#00cce0" stroke="white" stroke-width="0.4"/>
  <!-- Upper-left frond -->
  <path d="M13.5 14.5 C9 7 2 5 0 5 C2.5 9 7 12.5 11.5 14.5 Z" fill="#00b5cc"/>
  <!-- Upper-right frond -->
  <path d="M14.5 14.5 C19 7 26 5 28 5 C25.5 9 21 12.5 16.5 14.5 Z" fill="#00b5cc"/>
  <!-- Lower-left frond -->
  <path d="M13 16 C8 13 3 14 0.5 15 C3.5 17.5 8 18.5 12 17.5 Z" fill="#009eb5" opacity="0.9"/>
  <!-- Lower-right frond -->
  <path d="M15 16 C20 13 25 14 27.5 15 C24.5 17.5 20 18.5 16 17.5 Z" fill="#009eb5" opacity="0.9"/>
  <!-- Coconuts -->
  <circle cx="14.5" cy="17" r="1.8" fill="#a0622e"/>
  <circle cx="12.8" cy="18.2" r="1.4" fill="#8f5525"/>
  <!-- Bright tip dot — visually marks the click point -->
  <circle cx="14" cy="43" r="2" fill="#00d8f0" opacity="0.95"/>
  <circle cx="14" cy="43" r="1" fill="white"/>
</svg>
